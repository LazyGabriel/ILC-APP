<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 210" fill="none">
  <defs>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D5A80"/>
      <stop offset="50%" stop-color="#2B4065"/>
      <stop offset="100%" stop-color="#1E2F4D"/>
    </linearGradient>
    <linearGradient id="navyGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A577A"/>
      <stop offset="50%" stop-color="#28395C"/>
      <stop offset="100%" stop-color="#1C2C48"/>
    </linearGradient>
  </defs>

  <!-- I — two vertical pillars with top/bottom serifs -->
  <!-- Left pillar of I -->
  <rect x="18" y="22" width="38" height="166" rx="6" fill="url(#navyGrad)"/>
  <!-- Right pillar of I -->
  <rect x="70" y="22" width="38" height="166" rx="6" fill="url(#navyGrad)"/>
  <!-- Top crossbar of I -->
  <rect x="14" y="18" width="98" height="40" rx="8" fill="url(#navyGrad)"/>
  <!-- Bottom crossbar of I -->
  <rect x="14" y="152" width="98" height="40" rx="8" fill="url(#navyGrad)"/>

  <!-- L -->
  <!-- Vertical stem of L -->
  <rect x="132" y="18" width="44" height="174" rx="8" fill="url(#navyGrad2)"/>
  <!-- Horizontal foot of L -->
  <rect x="132" y="152" width="100" height="40" rx="8" fill="url(#navyGrad2)"/>

  <!-- C — thick arc shape built with clipping -->
  <path
    d="
      M 272 42
      C 272 30, 260 18, 240 18
      L 218 18
      C 190 18, 170 38, 165 62
      C 161 80, 161 130, 165 148
      C 170 172, 190 192, 218 192
      L 240 192
      C 260 192, 272 180, 272 168
      L 272 152
      C 272 144, 266 138, 258 138
      L 240 138
      C 228 138, 218 128, 218 116
      L 218 94
      C 218 82, 228 72, 240 72
      L 258 72
      C 266 72, 272 66, 272 58
      Z
    "
    fill="url(#navyGrad)"
  />

  <!-- ® symbol -->
  <g transform="translate(278, 14)">
    <circle cx="14" cy="14" r="13" stroke="#3D5A80" stroke-width="2.5" fill="none"/>
    <text x="14" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#3D5A80">R</text>
  </g>
</svg>
